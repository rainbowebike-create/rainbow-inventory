<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彩虹電動車 盤點系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #ff6b35;
    --accent2: #ffd166;
    --green: #06d6a0;
    --red: #ef476f;
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 0.05em;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text3);
  }

  .status-dot.active { background: var(--green); animation: pulse 2s infinite; }
  .status-dot.saving { background: var(--accent2); animation: pulse 0.5s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text {
    font-size: 12px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
  }

  .btn-save {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.2s;
  }

  .btn-save:hover { background: #e85d2a; transform: translateY(-1px); }
  .btn-save:disabled { background: var(--text3); cursor: not-allowed; transform: none; }

  /* Search */
  .search-wrap {
    position: relative;
  }

  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px 10px 40px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 16px;
  }

  /* Session bar */
  .session-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .session-info {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .session-label {
    font-size: 11px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .session-id {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent2);
    font-family: 'JetBrains Mono', monospace;
  }

  .session-actions {
    display: flex;
    gap: 8px;
  }

  .btn-new {
    background: transparent;
    color: var(--green);
    border: 1px solid var(--green);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.2s;
  }

  .btn-new:hover { background: var(--green); color: var(--bg); }

  .btn-report {
    background: transparent;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.2s;
  }

  .btn-report:hover { background: var(--accent2); color: var(--bg); }

  /* Category tabs */
  .cat-wrap {
    padding: 12px 20px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }

  .cat-wrap::-webkit-scrollbar { display: none; }

  .cat-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.2s;
  }

  .cat-btn:hover { border-color: var(--accent); color: var(--text); }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 700; }

  /* Main content */
  .main { padding: 16px 20px; }

  /* Product group */
  .product-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .group-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .group-cat {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    background: rgba(255,107,53,0.1);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .group-name {
    font-size: 16px;
    font-weight: 700;
  }

  .group-code {
    font-size: 12px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    margin-left: auto;
  }

  /* Item row */
  .item-row {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    transition: background 0.15s;
  }

  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: var(--surface2); }

  .item-color {
    font-size: 14px;
    color: var(--text2);
    flex: 1;
  }

  .item-code {
    font-size: 11px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
  }

  .item-system {
    font-size: 12px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    min-width: 60px;
    text-align: right;
  }

  .diff-badge {
    font-size: 11px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    min-width: 40px;
    text-align: center;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .diff-ok { color: var(--text3); }
  .diff-minus { color: var(--red); background: rgba(239,71,111,0.1); }
  .diff-plus { color: var(--green); background: rgba(6,214,160,0.1); }

  /* Counter */
  .counter {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .counter-btn {
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    line-height: 1;
  }

  .counter-btn.minus {
    background: rgba(239,71,111,0.15);
    color: var(--red);
  }

  .counter-btn.minus:hover { background: var(--red); color: white; }

  .counter-btn.plus {
    background: rgba(6,214,160,0.15);
    color: var(--green);
  }

  .counter-btn.plus:hover { background: var(--green); color: white; }

  .counter-val {
    font-size: 18px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    min-width: 36px;
    text-align: center;
    color: var(--text);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    transition: background 0.15s;
  }

  .counter-val:hover { background: var(--surface2); }

  /* Summary footer */
  .summary {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 2px solid var(--border);
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .summary-stats {
    display: flex;
    gap: 20px;
  }

  .stat {
    text-align: center;
  }

  .stat-val {
    font-size: 18px;
    font-weight: 900;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .stat-val.ok { color: var(--green); }
  .stat-val.warn { color: var(--accent2); }
  .stat-val.err { color: var(--red); }

  .btn-finish {
    background: var(--green);
    color: var(--bg);
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 900;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.2s;
  }

  .btn-finish:hover { background: #05c090; transform: translateY(-1px); }

  .page-bottom { height: 80px; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border-top: 3px solid var(--accent);
    padding: 24px 20px;
    width: 100%;
    max-width: 600px;
    max-height: 85vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .modal-overlay.show .modal { transform: translateY(0); }

  .modal-title {
    font-size: 18px;
    font-weight: 900;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-close {
    background: var(--surface2);
    border: none;
    color: var(--text2);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .report-item {
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .report-item.ok { background: rgba(6,214,160,0.08); border: 1px solid rgba(6,214,160,0.2); }
  .report-item.minus { background: rgba(239,71,111,0.08); border: 1px solid rgba(239,71,111,0.2); }
  .report-item.plus { background: rgba(255,209,102,0.08); border: 1px solid rgba(255,209,102,0.2); }

  .report-name { font-size: 13px; font-weight: 500; }
  .report-code { font-size: 11px; color: var(--text2); font-family: 'JetBrains Mono', monospace; }
  .report-diff { font-size: 14px; font-weight: 900; font-family: 'JetBrains Mono', monospace; }

  .report-section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 16px 0 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  .btn-apply {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    margin-top: 20px;
    transition: all 0.2s;
  }

  .btn-apply:hover { background: #e85d2a; }

  /* Input modal */
  .input-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .input-modal.show { opacity: 1; pointer-events: all; }

  .input-box {
    background: var(--surface);
    border-radius: 16px;
    border: 2px solid var(--accent);
    padding: 24px;
    width: 280px;
    text-align: center;
  }

  .input-box-title { font-size: 14px; color: var(--text2); margin-bottom: 12px; }
  .input-box-name { font-size: 16px; font-weight: 700; margin-bottom: 16px; }

  .input-box input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    color: var(--text);
    font-size: 24px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    text-align: center;
    outline: none;
    margin-bottom: 16px;
  }

  .input-box input:focus { border-color: var(--accent); }

  .input-box-btns { display: flex; gap: 8px; }

  .btn-cancel {
    flex: 1;
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
  }

  .btn-confirm {
    flex: 1;
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
  }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
    color: var(--text2);
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🌈</div>
      <div>
        <div class="logo-text">彩虹電動車</div>
        <div class="logo-sub">INVENTORY COUNT</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <div class="status-text" id="statusText">載入中...</div>
      </div>
      <button class="btn-save" id="btnSave" onclick="saveToSheet()" disabled>立即存檔</button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" placeholder="搜尋產品名稱或編號..." id="searchInput" oninput="filterItems()">
  </div>
</div>

<!-- Session bar -->
<div class="session-bar">
  <div class="session-info">
    <div>
      <div class="session-label">盤點場次</div>
      <div class="session-id" id="sessionId">-</div>
    </div>
    <div>
      <div class="session-label">開始時間</div>
      <div class="session-id" id="sessionTime">-</div>
    </div>
  </div>
  <div class="session-actions">
    <button class="btn-new" onclick="newSession()">＋ 新盤點</button>
    <button class="btn-report" onclick="showReport()">📊 差異報表</button>
  </div>
</div>

<!-- Category tabs -->
<div class="cat-wrap" id="catWrap">
  <button class="cat-btn active" onclick="filterCat('全部', this)">全部</button>
</div>

<!-- Main -->
<div class="main" id="mainContent">
  <div class="loading">
    <div class="spinner"></div>
    <div>讀取庫存資料中...</div>
  </div>
</div>

<div class="page-bottom"></div>

<!-- Summary footer -->
<div class="summary">
  <div class="summary-stats">
    <div class="stat">
      <div class="stat-val ok" id="statOk">0</div>
      <div class="stat-label">正常</div>
    </div>
    <div class="stat">
      <div class="stat-val err" id="statMinus">0</div>
      <div class="stat-label">短少</div>
    </div>
    <div class="stat">
      <div class="stat-val warn" id="statPlus">0</div>
      <div class="stat-label">多出</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statTotal" style="color:var(--text2)">0</div>
      <div class="stat-label">未盤點</div>
    </div>
  </div>
  <button class="btn-finish" onclick="showReport()">完成盤點 →</button>
</div>

<!-- Report Modal -->
<div class="modal-overlay" id="reportModal">
  <div class="modal">
    <div class="modal-title">
      📊 盤點差異報表
      <button class="modal-close" onclick="closeReport()">✕</button>
    </div>
    <div id="reportContent"></div>
    <button class="btn-apply" onclick="applyCount()">✅ 確認並更新庫存</button>
  </div>
</div>

<!-- Input Modal -->
<div class="input-modal" id="inputModal">
  <div class="input-box">
    <div class="input-box-title">輸入實際數量</div>
    <div class="input-box-name" id="inputItemName">-</div>
    <input type="number" id="inputValue" min="0" onkeydown="if(event.key==='Enter')confirmInput()">
    <div class="input-box-btns">
      <button class="btn-cancel" onclick="closeInput()">取消</button>
      <button class="btn-confirm" onclick="confirmInput()">確認</button>
    </div>
  </div>
</div>

<script>
// ── 設定區（部署時修改這裡）──
const SHEET_ID = '1yCEmCXPgPD0tTA6nA-EYgWRWz-cUvCq4aEm1WFFmsvE'; // 庫存試算表
const API_KEY = 'AIzaSyCwJje5ims-fXMxQna0gAnG-hHmANFqF24'; // Google Sheets API Key
const SHEET_NAME = '庫存';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzLO3J5qaOYaPdM2OrxrLqbTWF25EXYZMJxJ8rpv-ozsOODQQynjGpNJoZBhijVQuMV/exec';

// ── 資料 ──
let inventoryData = [];
let countData = {};
let currentSession = '';
let currentCat = '全部';
let currentInputKey = null;
let hasChanges = false;

// 類別代碼對應
const CAT_MAP = {
  'FK': '平叉', 'CL': '卡鉗', 'DS': '碟盤', 'SH': '避震',
  'TR': '輪胎', 'RM': '輪框', 'CM': '可愛馬專用', 'BT': '螺絲',
  'AS': '空氣開關', 'CS': '卡座', 'PH': '手機架', 'GR': '握把套'
};

function getCatFromCode(code) {
  const prefix = code.replace(/[0-9]/g, '').toUpperCase();
  return CAT_MAP[prefix] || '其他';
}

// ── 初始化 ──
window.onload = async () => {
  initSession();
  await loadInventory();
};

function initSession() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  currentSession = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}`;
  document.getElementById('sessionId').textContent = `#${currentSession}`;
  document.getElementById('sessionTime').textContent = `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

  // Load saved session
  const saved = localStorage.getItem(`count_${currentSession.split('-')[0]}`);
  if (saved) {
    countData = JSON.parse(saved);
  }
}

async function loadInventory() {
  setStatus('loading', '讀取資料中...');
  try {
    // 使用 Google Sheets API 讀取
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}?key=${API_KEY}`;
    const res = await fetch(url);

    if (!res.ok) throw new Error('API Error');

    const data = await res.json();
    const rows = data.values || [];

    // 跳過標題列
    inventoryData = rows.slice(1).filter(r => r[0] && r[0].trim()).map(r => ({
      code: r[0]?.trim() || '',
      name: r[1]?.trim() || '',
      qty: parseInt(r[2]) || 0,
      cat: getCatFromCode(r[0]?.trim() || '')
    }));

    buildCategories();
    renderItems();
    setStatus('ok', '資料與雲端一致');
    document.getElementById('btnSave').disabled = false;

  } catch(e) {
    // Demo mode with sample data
    inventoryData = [
      {code:'FK001', name:'HH幽靈平叉-黑色', qty:5, cat:'平叉'},
      {code:'FK002', name:'HH幽靈平叉-銀色', qty:5, cat:'平叉'},
      {code:'FK003', name:'HH魅影平叉-黑色', qty:5, cat:'平叉'},
      {code:'FK004', name:'HH魅影平叉-銀色', qty:3, cat:'平叉'},
      {code:'FK005', name:'HH魅影平叉-鈦色', qty:2, cat:'平叉'},
      {code:'CL001', name:'RZMA-M110小輻射-黑色', qty:10, cat:'卡鉗'},
      {code:'CL002', name:'RZMA-M110小輻射-銀色', qty:0, cat:'卡鉗'},
      {code:'CL003', name:'RZMA-M110小輻射-紅色', qty:1, cat:'卡鉗'},
      {code:'CL004', name:'RZMA-M619小螃蟹-黑色', qty:0, cat:'卡鉗'},
      {code:'CL005', name:'RZMA-M619小螃蟹-銀色', qty:1, cat:'卡鉗'},
      {code:'CL006', name:'RZMA-M616大輻射-銀色', qty:2, cat:'卡鉗'},
      {code:'CL007', name:'RZMA-M616大輻射-黑色', qty:3, cat:'卡鉗'},
    ];
    buildCategories();
    renderItems();
    setStatus('ok', '示範模式（未連線）');
    document.getElementById('btnSave').disabled = false;
  }
}

function setStatus(type, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot';
  if (type === 'ok') dot.classList.add('active');
  if (type === 'saving') dot.classList.add('saving');
  txt.textContent = text;
}

function buildCategories() {
  const cats = [...new Set(inventoryData.map(i => i.cat))];
  const wrap = document.getElementById('catWrap');
  wrap.innerHTML = '<button class="cat-btn active" onclick="filterCat(\'全部\', this)">全部</button>';
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = cat;
    btn.onclick = function() { filterCat(cat, this); };
    wrap.appendChild(btn);
  });
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderItems();
}

function filterItems() {
  renderItems();
}

function renderItems() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let items = inventoryData;

  if (currentCat !== '全部') items = items.filter(i => i.cat === currentCat);
  if (search) items = items.filter(i =>
    i.name.toLowerCase().includes(search) ||
    i.code.toLowerCase().includes(search)
  );

  // Group by cat+product line
  const groups = {};
  items.forEach(item => {
    // Group by first part of name (before -)
    const parts = item.name.split('-');
    const groupKey = `${item.cat}||${parts[0]}`;
    if (!groups[groupKey]) groups[groupKey] = { cat: item.cat, name: parts[0], items: [] };
    groups[groupKey].items.push(item);
  });

  const main = document.getElementById('mainContent');

  if (Object.keys(groups).length === 0) {
    main.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">找不到符合的品項</div></div>';
    return;
  }

  main.innerHTML = Object.entries(groups).map(([key, group]) => `
    <div class="product-group">
      <div class="group-header">
        <span class="group-cat">${group.cat}</span>
        <span class="group-name">${group.name.replace(/^[A-Z]+-/, '')}</span>
        <span class="group-code">${group.items[0].code.replace(/[0-9]+$/, '')}</span>
      </div>
      ${group.items.map(item => {
        const counted = countData[item.code];
        const hasCounted = counted !== undefined;
        const diff = hasCounted ? counted - item.qty : null;
        const diffClass = diff === null ? '' : diff < 0 ? 'diff-minus' : diff > 0 ? 'diff-plus' : 'diff-ok';
        const diffText = diff === null ? '' : diff > 0 ? `+${diff}` : `${diff}`;
        const namePart = item.name.includes('-') ? item.name.split('-').slice(1).join('-') : item.name;

        return `
          <div class="item-row" data-code="${item.code}">
            <div style="flex:1">
              <div class="item-color">${namePart}</div>
              <div class="item-code">${item.code}</div>
            </div>
            <div class="item-system">系統:${item.qty}</div>
            ${diff !== null ? `<div class="diff-badge ${diffClass}">${diffText || '✓'}</div>` : '<div style="width:40px"></div>'}
            <div class="counter">
              <button class="counter-btn minus" onclick="adjustCount('${item.code}', -1)">−</button>
              <div class="counter-val" onclick="openInput('${item.code}', '${item.name}')">${hasCounted ? counted : '?'}</div>
              <button class="counter-btn plus" onclick="adjustCount('${item.code}', 1)">＋</button>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `).join('');

  updateStats();
}

function adjustCount(code, delta) {
  const item = inventoryData.find(i => i.code === code);
  if (!item) return;

  const current = countData[code] !== undefined ? countData[code] : item.qty;
  const newVal = Math.max(0, current + delta);
  countData[code] = newVal;
  hasChanges = true;
  saveLocal();
  renderItems();
}

function openInput(code, name) {
  currentInputKey = code;
  const item = inventoryData.find(i => i.code === code);
  document.getElementById('inputItemName').textContent = name;
  document.getElementById('inputValue').value = countData[code] !== undefined ? countData[code] : (item?.qty || 0);
  document.getElementById('inputModal').classList.add('show');
  setTimeout(() => {
    const inp = document.getElementById('inputValue');
    inp.focus();
    inp.select();
  }, 100);
}

function closeInput() {
  document.getElementById('inputModal').classList.remove('show');
  currentInputKey = null;
}

function confirmInput() {
  const val = parseInt(document.getElementById('inputValue').value);
  if (isNaN(val) || val < 0) return;
  if (currentInputKey) {
    countData[currentInputKey] = val;
    hasChanges = true;
    saveLocal();
    renderItems();
  }
  closeInput();
}

function updateStats() {
  let ok = 0, minus = 0, plus = 0, uncounted = 0;
  inventoryData.forEach(item => {
    if (countData[item.code] === undefined) { uncounted++; return; }
    const diff = countData[item.code] - item.qty;
    if (diff < 0) minus++;
    else if (diff > 0) plus++;
    else ok++;
  });
  document.getElementById('statOk').textContent = ok;
  document.getElementById('statMinus').textContent = minus;
  document.getElementById('statPlus').textContent = plus;
  document.getElementById('statTotal').textContent = uncounted;
}

function showReport() {
  const minusItems = [];
  const plusItems = [];
  const okItems = [];
  const uncountedItems = [];

  inventoryData.forEach(item => {
    if (countData[item.code] === undefined) { uncountedItems.push(item); return; }
    const diff = countData[item.code] - item.qty;
    if (diff < 0) minusItems.push({...item, counted: countData[item.code], diff});
    else if (diff > 0) plusItems.push({...item, counted: countData[item.code], diff});
    else okItems.push({...item, counted: countData[item.code], diff});
  });

  let html = '';

  if (minusItems.length > 0) {
    html += `<div class="report-section-title">🔴 短少品項（${minusItems.length}筆）</div>`;
    html += minusItems.map(i => `
      <div class="report-item minus">
        <div>
          <div class="report-name">${i.name}</div>
          <div class="report-code">${i.code} ｜ 系統:${i.qty} → 實際:${i.counted}</div>
        </div>
        <div class="report-diff" style="color:var(--red)">${i.diff}</div>
      </div>
    `).join('');
  }

  if (plusItems.length > 0) {
    html += `<div class="report-section-title">🟡 多出品項（${plusItems.length}筆）</div>`;
    html += plusItems.map(i => `
      <div class="report-item plus">
        <div>
          <div class="report-name">${i.name}</div>
          <div class="report-code">${i.code} ｜ 系統:${i.qty} → 實際:${i.counted}</div>
        </div>
        <div class="report-diff" style="color:var(--accent2)">+${i.diff}</div>
      </div>
    `).join('');
  }

  if (okItems.length > 0) {
    html += `<div class="report-section-title">✅ 正常品項（${okItems.length}筆）</div>`;
    html += okItems.map(i => `
      <div class="report-item ok">
        <div>
          <div class="report-name">${i.name}</div>
          <div class="report-code">${i.code} ｜ 數量:${i.qty}</div>
        </div>
        <div class="report-diff" style="color:var(--green)">✓</div>
      </div>
    `).join('');
  }

  if (uncountedItems.length > 0) {
    html += `<div class="report-section-title">⚪ 未盤點（${uncountedItems.length}筆）</div>`;
    html += uncountedItems.map(i => `
      <div class="report-item" style="background:var(--surface2);border:1px solid var(--border)">
        <div>
          <div class="report-name">${i.name}</div>
          <div class="report-code">${i.code}</div>
        </div>
        <div class="report-diff" style="color:var(--text3)">-</div>
      </div>
    `).join('');
  }

  document.getElementById('reportContent').innerHTML = html;
  document.getElementById('reportModal').classList.add('show');
}

function closeReport() {
  document.getElementById('reportModal').classList.remove('show');
}

function applyCount() {
  if (!confirm('確認更新庫存？此操作將以盤點數量覆蓋系統庫存。')) return;
  closeReport();
  applyInventory();
}

function saveLocal() {
  const dateKey = currentSession.split('-')[0];
  localStorage.setItem(`count_${dateKey}`, JSON.stringify(countData));
}

async function saveToSheet() {
  setStatus('saving', '存檔中...');
  document.getElementById('btnSave').disabled = true;
  try {
    const items = inventoryData.map(item => ({
      code: item.code,
      name: item.name,
      systemQty: item.qty,
      counted: countData[item.code] !== undefined ? countData[item.code] : null
    })).filter(i => i.counted !== null);

    const url = `${APPS_SCRIPT_URL}?action=save_count&session=${encodeURIComponent(currentSession)}&items=${encodeURIComponent(JSON.stringify(items))}`;
    await fetch(url);

    setStatus('ok', '已存檔');
    hasChanges = false;
    alert('✅ 盤點紀錄已存檔！\n\n若要更新庫存數量，請點「確認並更新庫存」');
  } catch(e) {
    setStatus('error', '存檔失敗');
    alert('存檔失敗，請檢查網路連線');
  }
  document.getElementById('btnSave').disabled = false;
}

async function applyInventory() {
  setStatus('saving', '更新庫存中...');
  try {
    const items = inventoryData.map(item => ({
      code: item.code,
      name: item.name,
      systemQty: item.qty,
      counted: countData[item.code] !== undefined ? countData[item.code] : item.qty
    }));

    const url = `${APPS_SCRIPT_URL}?action=update_inventory&items=${encodeURIComponent(JSON.stringify(items))}`;
    await fetch(url);

    items.forEach(item => {
      const inv = inventoryData.find(i => i.code === item.code);
      if (inv) inv.qty = item.counted;
    });

    countData = {};
    hasChanges = false;
    setStatus('ok', '庫存已更新');
    renderItems();
    alert('✅ 庫存已更新完成！');
  } catch(e) {
    setStatus('error', '更新失敗');
    alert('更新失敗，請重試');
  }
}

function newSession() {
  if (hasChanges && !confirm('目前盤點尚未存檔，確定要開新盤點？')) return;
  countData = {};
  hasChanges = false;
  initSession();
  renderItems();
  alert('✅ 已開始新盤點場次！');
}

// 防止關閉未存檔
window.onbeforeunload = e => {
  if (hasChanges) return '盤點尚未存檔，確定要離開？';
};
</script>
</body>
</html>
