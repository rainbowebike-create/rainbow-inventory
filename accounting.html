<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彩虹電動車 記帳系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;--orange:#ff6b35;--orange2:#ff8c5a;--text:#f0f0f0;--text2:#999;--green:#4caf82;--red:#e05252;--blue:#5b8dee;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
  .header-icon{width:36px;height:36px;background:var(--orange);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
  .header-title{font-size:16px;font-weight:700;}
  .header-sub{font-size:10px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;}
  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;gap:4px;}
  .tab{padding:12px 20px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;}
  .tab.active{color:var(--orange);border-bottom-color:var(--orange);}
  .content{padding:16px;max-width:600px;margin:0 auto;}
  .form-group{margin-bottom:14px;}
  .form-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block;font-weight:600;letter-spacing:0.5px;}
  .form-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color 0.2s;}
  .form-input:focus{border-color:var(--orange);}
  .amount-wrap{position:relative;}
  .amount-prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:14px;}
  .amount-input{padding-left:28px!important;font-family:'JetBrains Mono',monospace!important;font-size:16px!important;}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .cat-btn{padding:10px 8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:12px;font-weight:600;font-family:'Noto Sans TC',sans-serif;cursor:pointer;text-align:center;transition:all 0.2s;}
  .cat-btn.active{background:rgba(255,107,53,0.15);border-color:var(--orange);color:var(--orange);}
  .section-bar{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:14px;}
  .section-bar-label{font-size:11px;color:var(--text2);font-weight:600;margin-bottom:8px;letter-spacing:0.5px;}
  .btn-add-item{width:100%;padding:12px;background:none;border:2px dashed var(--border);border-radius:12px;color:var(--text2);font-size:13px;font-weight:600;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all 0.2s;margin-bottom:12px;}
  .btn-add-item:hover{border-color:var(--orange);color:var(--orange);}
  .pending-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .pending-title{font-size:13px;font-weight:700;color:var(--text2);}
  .pending-total{font-size:16px;font-weight:900;color:var(--orange);font-family:'JetBrains Mono',monospace;}
  .pending-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
  .pending-item-left{flex:1;}
  .pending-item-name{font-size:13px;font-weight:600;}
  .pending-item-meta{font-size:11px;color:var(--text2);margin-top:2px;}
  .pending-item-amount{font-size:14px;font-weight:700;color:var(--orange);font-family:'JetBrains Mono',monospace;}
  .btn-pending-remove{background:none;border:none;color:var(--text2);font-size:14px;cursor:pointer;margin-left:8px;}
  .btn-submit{width:100%;padding:14px;background:var(--orange);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:background 0.2s;margin-top:4px;}
  .btn-submit:disabled{background:var(--border);color:var(--text2);cursor:not-allowed;}
  .divider{height:1px;background:var(--border);margin:16px 0;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:white;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;opacity:0;transition:opacity 0.3s;z-index:999;white-space:nowrap;}
  .toast.error{background:var(--red);}
  .toast.show{opacity:1;}
  .record-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;animation:fadeIn 0.3s ease;}
  .record-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .record-item{font-size:14px;font-weight:700;}
  .record-amount{font-size:16px;font-weight:700;color:var(--orange);font-family:'JetBrains Mono',monospace;}
  .record-meta{font-size:12px;color:var(--text2);display:flex;gap:10px;flex-wrap:wrap;}
  .record-tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;}
  .tag-購車訂金{background:rgba(255,107,53,0.15);color:var(--orange);}
  .tag-購車尾款{background:rgba(255,140,90,0.15);color:var(--orange2);}
  .tag-維修{background:rgba(91,141,238,0.15);color:var(--blue);}
  .tag-零件零售{background:rgba(76,175,130,0.15);color:var(--green);}
  .tag-服務,.tag-其他{background:rgba(153,153,153,0.15);color:var(--text2);}
  .summary-bar{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
  .summary-label{font-size:12px;color:var(--text2);}
  .summary-total{font-size:20px;font-weight:900;color:var(--orange);font-family:'JetBrains Mono',monospace;}
  .loading{text-align:center;padding:40px;color:var(--text2);font-size:13px;}
  .spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px;}
  .date-filter{display:flex;gap:8px;margin-bottom:16px;}
  .date-btn{flex:1;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:12px;font-weight:600;font-family:'Noto Sans TC',sans-serif;cursor:pointer;text-align:center;transition:all 0.2s;}
  .date-btn.active{background:rgba(255,107,53,0.15);border-color:var(--orange);color:var(--orange);}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">💰</div>
  <div>
    <div class="header-title">彩虹電動車</div>
    <div class="header-sub">Accounting System</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('add')">➕ 新增記帳</div>
  <div class="tab" onclick="switchTab('list')">📋 今日明細</div>
</div>

<div id="tab-add" class="content">

  <!-- 登打人員 -->
  <div class="section-bar">
    <div class="section-bar-label">👤 登打人員</div>
    <div class="grid3">
      <button class="cat-btn" id="op-Allison" onclick="selectOp('Allison')">Allison</button>
      <button class="cat-btn" id="op-珮君" onclick="selectOp('珮君')">珮君</button>
      <button class="cat-btn" id="op-智賢" onclick="selectOp('智賢')">智賢</button>
    </div>
  </div>

  <!-- 電話 -->
  <div class="section-bar">
    <div class="section-bar-label">📱 聯絡電話（同一客戶共用，選填）</div>
    <input type="tel" id="sharedPhone" class="form-input" placeholder="0933-xxx-xxx">
  </div>

  <!-- 項目輸入 -->
  <div class="form-group">
    <label class="form-label">類別</label>
    <div class="grid3">
      <button class="cat-btn" id="cat-購車訂金" onclick="selectCat('購車訂金')">購車訂金</button>
      <button class="cat-btn" id="cat-購車尾款" onclick="selectCat('購車尾款')">購車尾款</button>
      <button class="cat-btn" id="cat-維修" onclick="selectCat('維修')">維修</button>
      <button class="cat-btn" id="cat-零件零售" onclick="selectCat('零件零售')">零件零售</button>
      <button class="cat-btn" id="cat-服務" onclick="selectCat('服務')">服務</button>
      <button class="cat-btn" id="cat-其他" onclick="selectCat('其他')">其他</button>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">車型 / 項目名稱</label>
    <input type="text" id="item" class="form-input" placeholder="例如：A11黑色、更換碟盤">
  </div>
  <div class="form-group">
    <label class="form-label">金額</label>
    <div class="amount-wrap">
      <span class="amount-prefix">$</span>
      <input type="number" id="amount" class="form-input amount-input" placeholder="0" inputmode="numeric">
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">備註（選填）</label>
    <input type="text" id="note" class="form-input" placeholder="例如：等電池、轉帳">
  </div>

  <button class="btn-add-item" onclick="addToList()">＋ 繼續新增下一筆</button>

  <div id="pendingSection" style="display:none">
    <div class="pending-header">
      <span class="pending-title">📋 待送出清單</span>
      <span class="pending-total" id="pendingTotal">$0</span>
    </div>
    <div id="pendingItems"></div>
    <div class="divider"></div>
  </div>

  <button class="btn-submit" id="btnSubmit" onclick="submitAll()">✅ 確認送出</button>
</div>

<div id="tab-list" class="content" style="display:none">
  <div class="date-filter">
    <button class="date-btn active" id="btn-today" onclick="loadRecords('today')">今日</button>
    <button class="date-btn" id="btn-month" onclick="loadRecords('month')">本月</button>
  </div>
  <div id="records-content">
    <div class="loading"><div class="spinner"></div>載入中...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzLO3J5qaOYaPdM2OrxrLqbTWF25EXYZMJxJ8rpv-ozsOODQQynjGpNJoZBhijVQuMV/exec';
let selectedCat = '';
let selectedOp = localStorage.getItem('op') || '';
let pendingList = [];

// 初始化人員選擇
window.onload = function() {
  if (selectedOp) {
    const btn = document.getElementById('op-' + selectedOp);
    if (btn) btn.classList.add('active');
  }
};

function selectOp(op) {
  ['Allison','珮君','智賢'].forEach(n => {
    const b = document.getElementById('op-' + n);
    if (b) b.classList.remove('active');
  });
  const btn = document.getElementById('op-' + op);
  if (btn) btn.classList.add('active');
  selectedOp = op;
  localStorage.setItem('op', op);
}

function selectCat(cat) {
  ['購車訂金','購車尾款','維修','零件零售','服務','其他'].forEach(c => {
    const b = document.getElementById('cat-' + c);
    if (b) b.classList.remove('active');
  });
  const btn = document.getElementById('cat-' + cat);
  if (btn) btn.classList.add('active');
  selectedCat = cat;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active',(i===0&&tab==='add')||(i===1&&tab==='list')));
  document.getElementById('tab-add').style.display = tab==='add'?'block':'none';
  document.getElementById('tab-list').style.display = tab==='list'?'block':'none';
  if(tab==='list') loadRecords('today');
}

function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast'+(isError?' error':'')+' show';
  setTimeout(()=>t.classList.remove('show'), 3000);
}

function addToList() {
  const item = document.getElementById('item').value.trim();
  const amount = document.getElementById('amount').value.trim();
  const note = document.getElementById('note').value.trim();
  if(!selectedCat){showToast('請選擇類別',true);return;}
  if(!item){showToast('請填寫項目名稱',true);return;}
  if(!amount||isNaN(amount)||Number(amount)<=0){showToast('請填寫正確金額',true);return;}
  pendingList.push({cat:selectedCat, item, amount:Number(amount), note});
  renderPending();
  document.getElementById('item').value='';
  document.getElementById('amount').value='';
  document.getElementById('note').value='';
  selectedCat='';
  ['購車訂金','購車尾款','維修','零件零售','服務','其他'].forEach(c=>{
    const b=document.getElementById('cat-'+c);
    if(b) b.classList.remove('active');
  });
  showToast('已加入：'+item+' $'+Number(amount).toLocaleString());
}

function renderPending() {
  const section = document.getElementById('pendingSection');
  if(pendingList.length===0){section.style.display='none';return;}
  section.style.display='block';
  let total=0, html='';
  pendingList.forEach((p,i)=>{
    total+=p.amount;
    html+=`<div class="pending-item">
      <div class="pending-item-left">
        <div class="pending-item-name">${p.item}</div>
        <div class="pending-item-meta">${p.cat}${p.note?' ・ '+p.note:''}</div>
      </div>
      <div style="display:flex;align-items:center">
        <span class="pending-item-amount">$${p.amount.toLocaleString()}</span>
        <button class="btn-pending-remove" onclick="removePending(${i})">✕</button>
      </div>
    </div>`;
  });
  document.getElementById('pendingItems').innerHTML=html;
  document.getElementById('pendingTotal').textContent='$'+total.toLocaleString();
}

function removePending(i) {
  pendingList.splice(i,1);
  renderPending();
}

async function submitAll() {
  const item = document.getElementById('item').value.trim();
  const amount = document.getElementById('amount').value.trim();
  const note = document.getElementById('note').value.trim();

  if(item && amount && selectedCat && Number(amount)>0) {
    pendingList.push({cat:selectedCat, item, amount:Number(amount), note});
    document.getElementById('item').value='';
    document.getElementById('amount').value='';
    document.getElementById('note').value='';
    selectedCat='';
  }

  if(pendingList.length===0){showToast('請至少填寫一筆項目',true);return;}
  if(!selectedOp){showToast('請選擇登打人員',true);return;}

  const btn = document.getElementById('btnSubmit');
  btn.disabled=true;
  btn.textContent='送出中...';

  const phone = document.getElementById('sharedPhone').value.trim();
  const today = new Date().toISOString().split('T')[0];

  try {
    for(const p of pendingList) {
      const url = `${APPS_SCRIPT_URL}?action=notion_add&date=${encodeURIComponent(today)}&item=${encodeURIComponent(p.item)}&phone=${encodeURIComponent(phone)}&category=${encodeURIComponent(p.cat)}&amount=${encodeURIComponent(p.amount)}&note=${encodeURIComponent(p.note)}&operator=${encodeURIComponent(selectedOp)}`;
      await fetch(url);
    }
    const total = pendingList.reduce((s,p)=>s+p.amount,0);
    showToast('✅ 已送出 '+pendingList.length+' 筆，合計 $'+total.toLocaleString());
    pendingList=[];
    renderPending();
    document.getElementById('sharedPhone').value='';
  } catch(e) {
    showToast('送出失敗，請重試',true);
  }

  btn.disabled=false;
  btn.textContent='✅ 確認送出';
}

async function loadRecords(period) {
  document.getElementById('btn-today').classList.toggle('active',period==='today');
  document.getElementById('btn-month').classList.toggle('active',period==='month');
  document.getElementById('records-content').innerHTML='<div class="loading"><div class="spinner"></div>載入中...</div>';
  const today=new Date().toISOString().split('T')[0];
  const firstDay=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().split('T')[0];
  const start=period==='today'?today:firstDay;
  try {
    const res=await fetch(`${APPS_SCRIPT_URL}?action=notion_query&start=${start}&end=${today}`);
    const text=await res.text();
    let data;
    try{data=JSON.parse(text);}catch{data={results:[]};}
    renderRecords(data.results||[],period);
  } catch(e) {
    document.getElementById('records-content').innerHTML='<div class="loading">載入失敗，請重試</div>';
  }
}

function renderRecords(results,period) {
  if(!results.length){document.getElementById('records-content').innerHTML='<div class="loading">尚無記錄</div>';return;}
  let total=0,catTotals={},html='';
  [...results].reverse().forEach(r=>{
    const props=r.properties||{};
    const date=props['日期']?.date?.start||'';
    const item=props['項目名稱']?.title?.[0]?.text?.content||'';
    const phone=props['連絡電話']?.rich_text?.[0]?.text?.content||'';
    const cat=props['類別']?.multi_select?.[0]?.name||'';
    const amt=props['金額']?.number||0;
    const note=props['備註']?.rich_text?.[0]?.text?.content||'';
    const op=props['登打人員']?.multi_select?.[0]?.name||'';
    total+=amt;
    catTotals[cat]=(catTotals[cat]||0)+amt;
    html+=`<div class="record-card">
      <div class="record-header">
        <div class="record-item">${item}${phone?' <span style="color:var(--text2);font-size:12px">'+phone+'</span>':''}</div>
        <div class="record-amount">$${amt.toLocaleString()}</div>
      </div>
      <div class="record-meta">
        <span class="record-tag tag-${cat}">${cat}</span>
        ${period==='month'?`<span>${date}</span>`:''}
        ${op?`<span>👤 ${op}</span>`:''}
        ${note?`<span>📝 ${note}</span>`:''}
      </div>
    </div>`;
  });
  const title=period==='today'?'今日收款':'本月收款';
  let sum=`<div class="summary-bar"><div><div class="summary-label">${title}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">`;
  sum+=Object.entries(catTotals).map(([c,a])=>`${c} $${a.toLocaleString()}`).join('　');
  sum+=`</div></div><div class="summary-total">$${total.toLocaleString()}</div></div>`;
  document.getElementById('records-content').innerHTML=sum+html;
}
</script>
</body>
</html>
