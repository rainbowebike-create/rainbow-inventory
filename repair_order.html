<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彩虹電動車 維修/改裝開單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #161a24;
  --card: #1e2433;
  --border: #2a3044;
  --accent: #e8c547;
  --accent2: #ff6b35;
  --green: #4ade80;
  --red: #f87171;
  --text: #e8eaf0;
  --muted: #6b7591;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  padding-bottom: 120px;
}

/* Header */
.header {
  background: var(--surface);
  border-bottom: 2px solid var(--accent);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { width: 34px; height: 34px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; color: #000; flex-shrink: 0; }
.header-title { font-weight: 900; font-size: 17px; letter-spacing: 1px; }
.header-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.header-right { margin-left: auto; display: flex; gap: 8px; }

/* Type tabs */
.type-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  padding: 0 16px;
  gap: 4px;
}
.type-tab {
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.type-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Main */
.main { max-width: 780px; margin: 0 auto; padding: 16px; }

/* Section card */
.section-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 14px;
  overflow: hidden;
}
.section-title {
  background: var(--surface);
  padding: 10px 16px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--accent);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-body { padding: 14px 16px; }

/* Grid fields */
.field-grid { display: grid; gap: 10px; }
.field-grid.col2 { grid-template-columns: 1fr 1fr; }
.field-grid.col3 { grid-template-columns: 1fr 1fr 1fr; }
.field-grid.col4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.field-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; font-weight: 500; letter-spacing: 0.5px; }
.field-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 9px 12px;
  color: var(--text);
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  transition: border-color 0.2s;
  outline: none;
}
.field-input:focus { border-color: var(--accent); }
.field-input[readonly] { color: var(--muted); cursor: default; }

/* Item table */
.item-table-wrap { overflow-x: auto; }
.item-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  min-width: 700px;
}
.item-table th {
  background: var(--surface);
  padding: 8px 10px;
  text-align: left;
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--muted);
  font-weight: 700;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.item-table th.right { text-align: right; }
.item-table td { padding: 6px 6px; border-bottom: 1px solid #1a1f2e; vertical-align: middle; }
.item-table tr:last-child td { border-bottom: none; }
.item-table input {
  width: 100%;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 5px;
  padding: 5px 7px;
  color: var(--text);
  font-size: 12px;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.item-table input:focus { border-color: var(--accent); background: var(--surface); }
.item-table select {
  width: 100%;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 5px;
  padding: 5px 4px;
  color: var(--text);
  font-size: 12px;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
}
.item-table select:focus { border-color: var(--accent); background: var(--surface); }
.item-table select option { background: var(--card); }
.item-table .num-cell { text-align: right; font-family: 'Share Tech Mono', monospace; font-size: 12px; padding: 6px 10px; white-space: nowrap; }
.item-table .profit-cell { text-align: right; font-family: 'Share Tech Mono', monospace; font-size: 12px; padding: 6px 10px; }
.profit-pos { color: var(--green); }
.profit-neg { color: var(--red); }
.del-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 16px;
  padding: 4px 6px;
  border-radius: 4px;
  transition: color 0.2s, background 0.2s;
  line-height: 1;
}
.del-btn:hover { color: var(--red); background: rgba(248,113,113,0.1); }

/* Add row area */
.add-row-area {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.search-box {
  flex: 1;
  min-width: 200px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 8px 12px;
  color: var(--text);
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.search-box:focus { border-color: var(--accent); }
.search-results {
  position: absolute;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  z-index: 200;
  max-height: 240px;
  overflow-y: auto;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  min-width: 300px;
}
.search-result-item {
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: var(--surface); }
.sri-name { font-size: 13px; }
.sri-type { font-size: 11px; color: var(--muted); margin-top: 2px; }
.sri-price { font-size: 12px; color: var(--accent); font-family: 'Share Tech Mono', monospace; white-space: nowrap; }
.search-wrap { position: relative; flex: 1; min-width: 200px; }

/* Buttons */
.btn {
  padding: 9px 18px;
  border-radius: 8px;
  border: none;
  font-size: 13px;
  font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-accent { background: var(--accent); color: #000; }
.btn-accent:hover { background: #f0d060; }
.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); border-color: var(--text); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-green { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
.btn-green:hover { background: rgba(74,222,128,0.25); }

/* Summary bar */
.summary-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 2px solid var(--accent);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  z-index: 100;
}
.summary-item { text-align: center; }
.summary-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; font-weight: 700; }
.summary-val { font-size: 16px; font-family: 'Share Tech Mono', monospace; font-weight: 700; margin-top: 2px; }
.summary-val.total { color: var(--accent); font-size: 20px; }
.summary-val.profit { color: var(--green); }
.summary-divider { width: 1px; height: 36px; background: var(--border); }
.summary-actions { margin-left: auto; display: flex; gap: 8px; }

/* Quote print */
.quote-print { display: none; }
@media print {
  body > *:not(.quote-print) { display: none !important; }
  .quote-print { display: block !important; }
  .quote-print table { width: 100%; border-collapse: collapse; font-family: 'Noto Sans TC', sans-serif; font-size: 12px; }
  .quote-print th, .quote-print td { border: 1px solid #ccc; padding: 6px 10px; }
  .quote-print th { background: #f5f5f5; }
  .print-title { text-align: center; font-size: 18px; font-weight: 900; margin-bottom: 12px; }
  .print-info { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 12px; font-size: 12px; }
  .print-info span { color: #666; }
}


/* 老闆模式：成本/毛利預設隱藏 */
.boss-only { display: none !important; }
.boss-mode .boss-only { display: table-cell !important; }
.boss-mode .boss-only-flex { display: flex !important; }
.boss-only-flex { display: none !important; }
.boss-mode-btn { font-size: 13px; }
.boss-mode-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }


/* 品項選擇抽屜 */
.drawer-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.drawer-overlay.open { opacity: 1; pointer-events: all; }
.drawer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 2px solid var(--accent);
  border-radius: 16px 16px 0 0;
  z-index: 201;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  max-height: 80vh;
  display: flex; flex-direction: column;
}
.drawer.open { transform: translateY(0); }
.drawer-handle {
  width: 40px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 10px auto 0;
  flex-shrink: 0;
}
.drawer-header {
  padding: 10px 16px 0;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.drawer-title { font-weight: 900; font-size: 15px; flex: 1; }
.drawer-close {
  background: none; border: none; color: var(--muted);
  font-size: 20px; cursor: pointer; padding: 4px 8px;
  border-radius: 6px; line-height: 1;
}
.drawer-close:hover { color: var(--text); background: var(--card); }
.drawer-search {
  margin: 10px 16px 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 14px;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none;
  flex-shrink: 0;
}
.drawer-search:focus { border-color: var(--accent); }
.drawer-tabs {
  display: flex; gap: 4px;
  padding: 10px 16px 0;
  overflow-x: auto; flex-shrink: 0;
}
.drawer-tab {
  padding: 7px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px; font-weight: 700;
  color: var(--muted);
  cursor: pointer; white-space: nowrap;
  transition: all 0.15s;
}
.drawer-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
.drawer-list {
  flex: 1; overflow-y: auto;
  padding: 10px 16px 24px;
}
.drawer-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.drawer-item:active { background: var(--border); border-color: var(--accent); }
.drawer-item-left { flex: 1; }
.drawer-item-name { font-size: 15px; font-weight: 500; }
.drawer-item-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
.drawer-item-price {
  font-family: 'Share Tech Mono', monospace;
  font-size: 15px; font-weight: 700;
  color: var(--accent); text-align: right;
}
.drawer-item-price-label { font-size: 10px; color: var(--muted); text-align: right; }
.drawer-empty { text-align: center; padding: 30px; color: var(--muted); font-size: 13px; }

/* Tooltip */
.tip { font-size: 11px; color: var(--muted); margin-top: 5px; }

/* Loading */
.loading-overlay {
  position: fixed; inset: 0;
  background: rgba(13,15,20,0.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 999;
  flex-direction: column; gap: 12px;
}
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--card); border: 1px solid var(--border);
  padding: 10px 20px; border-radius: 8px;
  font-size: 13px; font-weight: 500;
  z-index: 500; opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.success { border-color: var(--green); color: var(--green); }
.toast.error { border-color: var(--red); color: var(--red); }

@media (max-width: 600px) {
  .field-grid.col2, .field-grid.col3, .field-grid.col4 { grid-template-columns: 1fr 1fr; }
  .summary-bar { flex-wrap: wrap; gap: 10px; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted)">載入零件資料中...</div>
</div>

<div class="toast" id="toast"></div>

<div class="header">
  <div class="logo">🌈</div>
  <div>
    <div class="header-title">彩虹電動車</div>
    <div class="header-sub">維修 / 改裝 開單系統</div>
  </div>
  <div class="header-right">
    <button class="btn btn-ghost btn-sm boss-mode-btn" id="bossModeBtn" onclick="toggleBossMode()">🔒 老闆</button>
    <a href="repair_history.html" class="btn btn-ghost btn-sm">📋 紀錄</a>
    <button class="btn btn-outline btn-sm" onclick="clearAll()">🗑 清除</button>
    <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨 列印</button>
  </div>
</div>

<div class="type-bar">
  <div class="type-tab active" onclick="setType('repair')" id="tab-repair">🔧 維修 / 改裝單</div>
  <div class="type-tab" onclick="setType('parts')" id="tab-parts">📦 零件銷售</div>
</div>

<div class="main">

  <!-- 訂單資訊 -->
  <div class="section-card">
    <div class="section-title">📋 訂單資訊</div>
    <div class="section-body">
      <div class="field-grid col4">
        <div>
          <div class="field-label">接單日期</div>
          <input class="field-input" type="date" id="orderDate">
        </div>
        <div>
          <div class="field-label">完成日期</div>
          <input class="field-input" type="date" id="doneDate">
        </div>
        <div>
          <div class="field-label">接單人員</div>
          <input class="field-input" type="text" id="staffIn" placeholder="姓名">
        </div>
        <div>
          <div class="field-label">維修/作業人員</div>
          <input class="field-input" type="text" id="staffWork" placeholder="姓名">
        </div>
      </div>
      <div class="field-grid col2" style="margin-top:10px">
        <div>
          <div class="field-label">車架號碼</div>
          <input class="field-input" type="text" id="frameNo" placeholder="車架號碼">
        </div>
        <div>
          <div class="field-label">車牌號碼</div>
          <input class="field-input" type="text" id="plateNo" placeholder="車牌號碼">
        </div>
      </div>
    </div>
  </div>

  <!-- 客戶資訊 -->
  <div class="section-card">
    <div class="section-title">👤 客戶資訊</div>
    <div class="section-body">
      <div class="field-grid col2">
        <div>
          <div class="field-label">客戶姓名</div>
          <input class="field-input" type="text" id="cusName" placeholder="姓名">
        </div>
        <div>
          <div class="field-label">電話</div>
          <input class="field-input" type="tel" id="cusPhone" placeholder="0912-345-678">
        </div>
        <div>
          <div class="field-label">備用聯絡人</div>
          <input class="field-input" type="text" id="cusName2" placeholder="姓名">
        </div>
        <div>
          <div class="field-label">備用電話</div>
          <input class="field-input" type="tel" id="cusPhone2" placeholder="0912-345-678">
        </div>
      </div>
      <div style="margin-top:10px">
        <div class="field-label">地址</div>
        <input class="field-input" type="text" id="cusAddr" placeholder="地址（選填）">
      </div>
    </div>
  </div>

  <!-- 商品明細 -->
  <div class="section-card">
    <div class="section-title">🔩 商品明細</div>

    <div class="item-table-wrap">
      <table class="item-table">
        <thead>
          <tr>
            <th style="width:36%">品項名稱</th>
            <th style="width:10%">種類</th>
            <th style="width:7%">數量</th>
            <th class="right boss-only" style="width:12%">成本價</th>
            <th class="right" id="priceColHeader" style="width:12%">完工價</th>
            <th class="right" style="width:11%">合計</th>
            <th class="right boss-only" style="width:9%">毛利</th>
            <th style="width:3%"></th>
          </tr>
        </thead>
        <tbody id="itemBody">
        </tbody>
      </table>
    </div>

    <div class="add-row-area">
      <button class="btn btn-accent" onclick="openDrawer()" style="flex:1;justify-content:center;font-size:15px;padding:12px">＋ 加入品項</button>
      <button class="btn btn-ghost btn-sm" onclick="addManualRow()">手動新增</button>
    </div>
  </div>

  <!-- 備註 & 收款 -->
  <div class="section-card">
    <div class="section-title">💰 收款資訊</div>
    <div class="section-body">
      <div class="field-grid col3">
        <div>
          <div class="field-label">訂金金額</div>
          <input class="field-input" type="number" id="deposit" placeholder="0" oninput="calcSummary()">
        </div>
        <div>
          <div class="field-label">餘額（自動計算）</div>
          <input class="field-input" type="text" id="balance" readonly>
        </div>
        <div>
          <div class="field-label">完工總額（自動計算）</div>
          <input class="field-input" type="text" id="totalDisplay" readonly>
        </div>
      </div>
      <div style="margin-top:10px">
        <div class="field-label">備註</div>
        <textarea class="field-input" id="notes" rows="2" placeholder="特殊要求、注意事項..." style="resize:vertical"></textarea>
      </div>
    </div>
  </div>

</div><!-- end main -->

<!-- Summary bar -->
<div class="summary-bar">
  <div class="summary-item">
    <div class="summary-label">品項數</div>
    <div class="summary-val" id="sumCount">0</div>
  </div>
  <div class="summary-divider"></div>
  <div class="summary-item boss-only-flex" style="text-align:center">
    <div class="summary-label">成本合計</div>
    <div class="summary-val" id="sumCost">$0</div>
  </div>
  <div class="summary-divider boss-only-flex"></div>
  <div class="summary-item">
    <div class="summary-label">完工總額</div>
    <div class="summary-val total" id="sumTotal">$0</div>
  </div>
  <div class="summary-divider"></div>
  <div class="summary-item boss-only-flex" style="text-align:center">
    <div class="summary-label">毛利</div>
    <div class="summary-val profit" id="sumProfit">$0</div>
  </div>
  <div class="summary-actions">
    <button class="btn btn-outline btn-sm" onclick="window.print()">🖨 列印</button>
    <button class="btn btn-accent" onclick="generateOrder()">✅ 產生訂單</button>
  </div>
</div>


<!-- 品項抽屜 -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <div class="drawer-title">選擇品項</div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <input class="drawer-search" type="text" id="drawerSearch" placeholder="🔍 搜尋名稱..." oninput="renderDrawer()">
  <div class="drawer-tabs" id="drawerTabs">
    <div class="drawer-tab active" onclick="setDrawerTab('all')" id="dtab-all">全部</div>
    <div class="drawer-tab" onclick="setDrawerTab('battery')" id="dtab-battery">🔋 電池</div>
    <div class="drawer-tab" onclick="setDrawerTab('accessory')" id="dtab-accessory">🔩 配件</div>
    <div class="drawer-tab" onclick="setDrawerTab('charger')" id="dtab-charger">🔌 充電器</div>
    <div class="drawer-tab" onclick="setDrawerTab('controller')" id="dtab-controller">⚙️ 控制器</div>
    <div class="drawer-tab" onclick="setDrawerTab('caliper')" id="dtab-caliper">🔴 卡鉗</div>
    <div class="drawer-tab" onclick="setDrawerTab('rotor')" id="dtab-rotor">⭕ 碟盤</div>
    <div class="drawer-tab" onclick="setDrawerTab('swingarm')" id="dtab-swingarm">🔧 平叉</div>
  </div>
  <div class="drawer-list" id="drawerList"></div>
</div>

<!-- Print layout -->
<div class="quote-print" id="printArea"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxJ9Vj0bbsemvgLwED1ivTMcuZ3mut_s9dXKDmnQd_2htCocCEXHQPefv5xitaiQy8a3g/exec';

let priceData = { accessories: [], batteries: [], chargers: [], controllers: [] };
let items = []; // { name, type, qty, cost, price }
let orderType = 'repair';

const TYPES = ['零件', '電機', '電池', '控制器', '碟盤', '卡鉗', '避震器', '輪胎', '車燈', '儀表', '充電器', '服務', '其他'];


// ── 老闆模式 ──
let bossMode = false;
function toggleBossMode() {
  bossMode = !bossMode;
  document.body.classList.toggle('boss-mode', bossMode);
  const btn = document.getElementById('bossModeBtn');
  btn.textContent = bossMode ? '🔓 老闆' : '🔒 老闆';
  btn.classList.toggle('active', bossMode);
}

// ── 初始化 ──
// search replaced with code input

document.addEventListener('DOMContentLoaded', async () => {
  // set today
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('orderDate').value = today;

  await loadPriceData();
  // 不預設空白行
});

async function loadPriceData() {
  try {
    const res = await fetch(GAS_URL + '?action=getPriceData');
    priceData = await res.json();
  } catch(e) {
    console.warn('無法載入 GAS 資料，搜尋功能將只顯示配件', e);
    priceData = { accessories: [], batteries: [], chargers: [], controllers: [] };
  }
  document.getElementById('loadingOverlay').style.display = 'none';
}

// ── 單據類型 ──
function setType(type) {
  orderType = type;
  document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + type).classList.add('active');

  // 調整維修人員 label
  const staffWorkInput = document.getElementById('staffWork');
  const parent = staffWorkInput?.previousElementSibling;
  if (parent) parent.textContent = type === 'repair' ? '維修/改裝人員' : '銷售人員';

  // 調整價格欄位標題
  const hdr = document.getElementById('priceColHeader');
  if (hdr) hdr.textContent = type === 'parts' ? '零售價' : '完工價';
}

// ── 品項抽屜 ──
let drawerTab = 'all';

function buildItemPool() {
  const isParts = orderType === 'parts';
  const pool = [];
  (priceData.batteries || []).forEach(b => pool.push({
    code: String(b.code), name: b.name, category: 'battery', type: '電池',
    cost: b.cost || 0, price: b.retailPrice || 0, priceLabel: '零售價'
  }));
  (priceData.accessories || []).forEach(a => pool.push({
    code: String(a.code), name: a.name, category: 'accessory', type: '配件',
    cost: a.cost || 0, price: isParts ? (a.retailPrice||0) : (a.price||0), priceLabel: isParts ? '零售價' : '完工價'
  }));
  (priceData.chargers || []).forEach(c => pool.push({
    code: String(c.code), name: c.name, category: 'charger', type: '充電器',
    cost: c.cost || 0, price: isParts ? (c.retailPrice||0) : (c.price||0), priceLabel: isParts ? '零售價' : '完工價'
  }));
  (priceData.controllers || []).forEach(c => pool.push({
    code: String(c.code), name: c.name, category: 'controller', type: '控制器',
    cost: c.cost || 0, price: isParts ? (c.retailPrice||0) : (c.price||0), priceLabel: isParts ? '零售價' : '完工價'
  }));
  (priceData.calipers || []).forEach(c => pool.push({
    code: String(c.code), name: c.name, category: 'caliper', type: '卡鉗',
    cost: c.cost || 0, price: isParts ? (c.retailPrice||0) : (c.price||0), priceLabel: isParts ? '零售價' : '完工價'
  }));
  (priceData.rotors || []).forEach(c => pool.push({
    code: String(c.code), name: c.name, category: 'rotor', type: '碟盤',
    cost: c.cost || 0, price: isParts ? (c.retailPrice||0) : (c.price||0), priceLabel: isParts ? '零售價' : '完工價'
  }));
  (priceData.swingarms || []).forEach(c => pool.push({
    code: String(c.code), name: c.name, category: 'swingarm', type: '平叉',
    cost: c.cost || 0, price: isParts ? (c.retailPrice||0) : (c.price||0), priceLabel: isParts ? '零售價' : '完工價'
  }));
  return pool;
}

function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawerSearch').value = '';
  drawerTab = 'all';
  document.querySelectorAll('.drawer-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('dtab-all').classList.add('active');
  renderDrawer();
  setTimeout(() => document.getElementById('drawerSearch').focus(), 300);
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}

function setDrawerTab(tab) {
  drawerTab = tab;
  document.querySelectorAll('.drawer-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('dtab-' + tab).classList.add('active');
  renderDrawer();
}

function renderDrawer() {
  const q = document.getElementById('drawerSearch').value.trim();
  let pool = buildItemPool();
  if (drawerTab !== 'all') pool = pool.filter(p => p.category === drawerTab);
  if (q) pool = pool.filter(p => p.name.includes(q) || p.code.includes(q));

  if (pool.length === 0) {
    document.getElementById('drawerList').innerHTML = '<div class="drawer-empty">找不到符合品項</div>';
    return;
  }

  document.getElementById('drawerList').innerHTML = pool.map((item, i) => `
    <div class="drawer-item" onclick="selectDrawerItem(${i})" data-pool-idx="${i}">
      <div class="drawer-item-left">
        <div class="drawer-item-name">${item.name}</div>
        <div class="drawer-item-sub">${item.type}・編號 ${item.code}</div>
      </div>
      <div>
        <div class="drawer-item-price">$${item.price.toLocaleString()}</div>
        <div class="drawer-item-price-label">${item.priceLabel}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('drawerList')._pool = pool;
}

function selectDrawerItem(idx) {
  const pool = document.getElementById('drawerList')._pool;
  const item = pool[idx];
  addItemRow(item.name, item.type, 1, item.cost, item.price, item.code);
  closeDrawer();
}

// ── 新增品項列 ──
function addManualRow(name = '') {
  addItemRow(name, '零件', 1, 0, 0);
}

function addItemRow(name, type, qty, cost, price, code = '') {
  const id = Date.now() + Math.random();
  items.push({ id, name, type, qty, cost, price, code });
  renderItems();
  // focus name if empty
  if (!name) {
    setTimeout(() => {
      const inputs = document.querySelectorAll(`[data-id="${id}"] .item-name`);
      if (inputs[0]) inputs[0].focus();
    }, 50);
  }
}

function removeItem(id) {
  items = items.filter(i => i.id !== id);
  renderItems();
}

function updateItem(id, field, value) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  if (field === 'qty' || field === 'cost' || field === 'price') {
    item[field] = parseFloat(value) || 0;
  } else {
    item[field] = value;
  }
  renderItems();
}

function renderItems() {
  const tbody = document.getElementById('itemBody');
  tbody.innerHTML = items.map(item => {
    const subtotal = Math.round(item.qty * item.price);
    const profitPerUnit = item.price - item.cost;
    const profit = Math.round(item.qty * profitPerUnit);
    const profitClass = profit >= 0 ? 'profit-pos' : 'profit-neg';
    const profitSign = profit >= 0 ? '+' : '';
    return `
      <tr data-id="${item.id}">
        <td><input class="item-name" value="${escHtml(item.name)}" placeholder="品項名稱" onchange="updateItem(${item.id},'name',this.value)" oninput="updateItem(${item.id},'name',this.value)"></td>
        <td>
          <select onchange="updateItem(${item.id},'type',this.value)">
            ${TYPES.map(t => `<option value="${t}" ${item.type===t?'selected':''}>${t}</option>`).join('')}
          </select>
        </td>
        <td><input type="number" value="${item.qty}" min="0.1" step="0.1" style="text-align:center" onchange="updateItem(${item.id},'qty',this.value)" oninput="updateItem(${item.id},'qty',this.value)"></td>
        <td class="boss-only"><input type="number" value="${item.cost}" min="0" style="text-align:right" onchange="updateItem(${item.id},'cost',this.value)" oninput="updateItem(${item.id},'cost',this.value)"></td>
        <td><input type="number" value="${item.price}" min="0" style="text-align:right" onchange="updateItem(${item.id},'price',this.value)" oninput="updateItem(${item.id},'price',this.value)"></td>
        <td class="num-cell">$${subtotal.toLocaleString()}</td>
        <td class="profit-cell boss-only ${profitClass}">${profitSign}$${profit.toLocaleString()}</td>
        <td><button class="del-btn" onclick="removeItem(${item.id})">✕</button></td>
      </tr>
    `;
  }).join('');
  calcSummary();
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 計算 ──
function calcSummary() {
  const totalCost = items.reduce((s, i) => s + Math.round(i.qty * i.cost), 0);
  const totalPrice = items.reduce((s, i) => s + Math.round(i.qty * i.price), 0);
  const profit = totalPrice - totalCost;
  const deposit = parseInt(document.getElementById('deposit').value) || 0;
  const balance = totalPrice - deposit;

  document.getElementById('sumCount').textContent = items.length;
  document.getElementById('sumCost').textContent = '$' + totalCost.toLocaleString();
  document.getElementById('sumTotal').textContent = '$' + totalPrice.toLocaleString();
  const profitEl = document.getElementById('sumProfit');
  profitEl.textContent = (profit >= 0 ? '+' : '') + '$' + profit.toLocaleString();
  profitEl.style.color = profit >= 0 ? 'var(--green)' : 'var(--red)';

  document.getElementById('totalDisplay').value = '$' + totalPrice.toLocaleString();
  document.getElementById('balance').value = '$' + Math.max(0, balance).toLocaleString();
}

// ── 產生訂單 ──
async function generateOrder() {
  if (items.length === 0) { showToast('請先新增品項', 'error'); return; }
  if (!document.getElementById('cusName').value) { showToast('請填寫客戶姓名', 'error'); return; }

  // 組裝資料
  const payload = {
    action: 'createRepairOrder',
    orderType,
    orderDate:  document.getElementById('orderDate').value,
    doneDate:   document.getElementById('doneDate').value,
    cusName:    document.getElementById('cusName').value,
    cusPhone:   document.getElementById('cusPhone').value,
    cusName2:   document.getElementById('cusName2').value,
    cusPhone2:  document.getElementById('cusPhone2').value,
    cusAddr:    document.getElementById('cusAddr').value,
    frameNo:    document.getElementById('frameNo').value,
    plateNo:    document.getElementById('plateNo').value,
    staffIn:    document.getElementById('staffIn').value,
    staffWork:  document.getElementById('staffWork').value,
    deposit:    parseInt(document.getElementById('deposit').value) || 0,
    notes:      document.getElementById('notes').value,
    items: items.filter(i => i.name && i.name.trim()).map(i => ({
      code:  i.code || '',
      name:  i.name.trim(),
      type:  i.type,
      qty:   i.qty,
      cost:  i.cost,
      price: i.price
    }))
  };

  // 顯示 loading
  const btn = document.querySelector('.summary-actions .btn-accent');
  const original = btn.innerHTML;
  btn.innerHTML = '⏳ 儲存中...';
  btn.disabled = true;

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    const result = await res.json();

    if (result.success) {
      buildPrintArea(result.orderId);
      showToast(`✅ 訂單 ${result.orderId} 已儲存！`, 'success');
    } else {
      showToast('❌ 儲存失敗：' + (result.message || ''), 'error');
    }
  } catch(e) {
    showToast('❌ 網路錯誤，請重試', 'error');
  }

  btn.innerHTML = original;
  btn.disabled = false;
}

function buildPrintArea(orderId = '') {
  const totalCost = items.reduce((s, i) => s + Math.round(i.qty * i.cost), 0);
  const totalPrice = items.reduce((s, i) => s + Math.round(i.qty * i.price), 0);
  const deposit = parseInt(document.getElementById('deposit').value) || 0;
  const balance = totalPrice - deposit;
  const typeName = { repair: '維修 / 改裝單', parts: '零件銷售單' }[orderType];

  const rows = items.map(item => {
    const subtotal = Math.round(item.qty * item.price);
    return `<tr>
      <td>${escHtml(item.name)}</td>
      <td style="text-align:center">${item.type}</td>
      <td style="text-align:center">${item.qty}</td>
      <td style="text-align:right">$${Math.round(item.price).toLocaleString()}</td>
      <td style="text-align:right">$${subtotal.toLocaleString()}</td>
    </tr>`;
  }).join('');

  document.getElementById('printArea').innerHTML = `
    <div class="print-title">🌈 彩虹電動車 ${typeName}</div>
    ${orderId ? `<div style="text-align:center;font-size:12px;color:#666;margin-bottom:8px">訂單編號：${orderId}</div>` : ''}
    <div class="print-info">
      <div><span>接單日期：</span>${document.getElementById('orderDate').value}</div>
      <div><span>完成日期：</span>${document.getElementById('doneDate').value}</div>
      <div><span>接單人員：</span>${document.getElementById('staffIn').value}</div>
      <div><span>維修人員：</span>${document.getElementById('staffWork').value}</div>
      <div><span>車架號碼：</span>${document.getElementById('frameNo').value}</div>
      <div><span>車牌號碼：</span>${document.getElementById('plateNo').value}</div>
      <div><span>客戶姓名：</span>${document.getElementById('cusName').value}</div>
      <div><span>電話：</span>${document.getElementById('cusPhone').value}</div>
    </div>
    <table>
      <thead><tr><th>品項名稱</th><th>種類</th><th>數量</th><th>${orderType === 'parts' ? '零售價' : '完工價'}</th><th>合計</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">
      <div><strong>備註：</strong>${document.getElementById('notes').value}</div>
      <div style="text-align:right">
        <div>訂金：$${deposit.toLocaleString()}</div>
        <div>餘額：$${Math.max(0,balance).toLocaleString()}</div>
        <div style="font-size:16px;font-weight:900;margin-top:4px">總計：$${totalPrice.toLocaleString()}</div>
      </div>
    </div>
  `;
}

// ── 清除 ──
function clearAll() {
  if (!confirm('確定要清除所有資料？')) return;
  items = [];
  renderItems();
  ['cusName','cusPhone','cusName2','cusPhone2','cusAddr','staffIn','staffWork','frameNo','plateNo','doneDate','notes','deposit'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('orderDate').value = new Date().toISOString().slice(0,10);
  calcSummary();
}

// ── Toast ──
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast'; }, 2500);
}
</script>

</body>
</html>
